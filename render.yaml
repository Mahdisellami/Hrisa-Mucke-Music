services:
  # Backend API Service
  - type: web
    name: music-tool-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile.prod
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ALLOWED_ORIGINS
        sync: false

# Note: Free tier does not support persistent disks
# Database will be ephemeral and reset on redeployments
# For persistent storage, upgrade to a paid plan ($7/month for Starter)

# Optional: Add PostgreSQL database if you want to migrate from SQLite
# databases:
#   - name: music-tool-db
#     databaseName: music_tool
#     user: music_user
#     plan: free
