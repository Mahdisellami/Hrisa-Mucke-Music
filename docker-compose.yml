version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app
      - ./:/app/root
      - ./music.db:/app/music.db  # SQLite database
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///music.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
    restart: unless-stopped

  web-app:
    build: ./mobile-app
    container_name: web_app
    ports:
      - "8081:8081"
    volumes:
      - ./mobile-app:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=0.0.0.0
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: ["npm", "run", "web"]